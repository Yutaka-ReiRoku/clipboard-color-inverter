  </defs>
  <rect width="512" height="512" rx="128" fill="url(#bgGrad)"/>
  <rect x="24" y="24" width="464" height="464" rx="104" fill="none" stroke="url(#accentGrad)" stroke-width="12" stroke-opacity="0.5"/>
  <g transform="translate(106, 106)">
    <!-- Clipboard Board -->
    <rect x="40" y="60" width="220" height="270" rx="24" fill="#334155" stroke="url(#accentGrad)" stroke-width="8"/>
    <!-- Clip Top -->
    <rect x="100" y="40" width="100" height="36" rx="10" fill="url(#accentGrad)"/>
